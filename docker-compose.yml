services:
    nifi:
        container_name: nifi
        image: apache/nifi:latest
        ports:
            - 8443:8443
        networks:
            - yt-sentiment-net
        environment:
            - "SINGLE_USER_CREDENTIALS_USERNAME=admin"
            - "SINGLE_USER_CREDENTIALS_PASSWORD=federico12345"
        volumes:
            - nifi_conf:/opt/nifi/nifi-current/conf
            - nifi_state:/opt/nifi/nifi-current/state
        depends_on:
            - broker

    broker:
        container_name: broker
        image: apache/kafka:latest
        ports:
            - 9092:9092
        environment: 
            - "KAFKA_NODE_ID=1"
            - "KAFKA_PROCESS_ROLES=broker,controller"
            - "KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - "KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://broker:9092"
            - "KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER"
            - "KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - "KAFKA_CONTROLLER_QUORUM_VOTERS=1@broker:9093"
            - "KAFKA_NUM_PARTITIONS=1"
        networks:
            - yt-sentiment-net
    
    create-topic:
        container_name: create-topic
        image: apache/kafka:latest
        command: >
            bash -c "/opt/kafka/bin/kafka-topics.sh --create --topic yt-comments --bootstrap-server broker:9092 --if-not-exists"
        depends_on:
           - broker
        networks:
            - yt-sentiment-net
    spark:
        container_name: spark
        build:
            context: ./spark
            dockerfile: Dockerfile
        ports:
            - 4040:4040
        networks:
            - yt-sentiment-net
        volumes:
            - ./spark/code/:/opt/sparkStream/
        command: >
            /opt/spark/bin/spark-submit --conf "spark.jars.ivy=/tmp/.ivy2" --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.3,org.elasticsearch:elasticsearch-spark-30_2.12:8.12.0 /opt/sparkStream/sentiment.py 
        restart: on-failure
        depends_on:
            create-topic:
                condition: service_completed_successfully
            elasticsearch:
                condition: service_started
    elasticsearch:
        container_name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - ES_JAVA_OPTS=-Xms512m -Xmx512m
        ports:
            - 9200:9200
        networks:
            - yt-sentiment-net
        volumes:
            - es_data:/usr/share/elasticsearch/data
    kibana:
        container_name: kibana
        image: docker.elastic.co/kibana/kibana:8.12.0
        ports:
            - 5601:5601
        volumes:
            - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
        networks:
            - yt-sentiment-net
        depends_on:
            - elasticsearch
networks:
    yt-sentiment-net:
        external: true

volumes:
    nifi_conf:
    nifi_state:
    es_data:
